<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotly</title>
  <style>
    body { margin: 0; background: #F7F6F3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .loader { text-align: center; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #0F766E; display: inline-block; margin: 0 4px; animation: bounce 1s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div class="loader">
    <div style="font-size:24px;font-weight:700;color:#0F3D38;margin-bottom:16px">Spotly</div>
    <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  </div>

  <script>
    // ── GitHub Pages Deep-Link Redirect ────────────────────────────────
    //
    // GitHub Pages serves 404.html for any path that isn't a real file.
    // When a shared provider link like:
    //   https://prediktaisystems-byte.github.io/Spotly/provider/PRV1001
    // is opened, GitHub Pages hits this file.
    //
    // Strategy:
    //   1. Save the full original path in sessionStorage.
    //   2. Redirect to the repo root (index.html).
    //   3. index.html reads sessionStorage, restores the URL, and opens
    //      the provider profile.
    //
    (function () {
      var path = window.location.pathname;   // e.g. /Spotly/provider/PRV1001
      var search = window.location.search;   // preserve any query string
      var hash = window.location.hash;       // preserve any hash

      // Only do the redirect for paths that look like app routes.
      // This avoids an infinite redirect loop if index.html itself 404s
      // (which shouldn't happen, but is a safety guard).
      if (path.indexOf('/provider/') !== -1) {
        sessionStorage.setItem('spotly_redirect_path', path + search + hash);

        // Derive the repo base path:
        //   GitHub Pages:  /Spotly  (first segment of pathname)
        //   Vercel/custom: ''       (pathname is just /)
        var origin = window.location.origin;
        var isGithubPages = origin.indexOf('github.io') !== -1;
        var parts = path.split('/').filter(Boolean);
        var base = isGithubPages && parts.length > 0 ? '/' + parts[0] : '';

        // Redirect to index.html at the repo root
        window.location.replace(origin + base + '/');
      } else {
        // For any other 404, show a friendly message after a brief pause
        setTimeout(function () {
          document.querySelector('.loader').innerHTML =
            '<div style="color:#0F3D38;font-size:16px;font-weight:600">Page not found</div>' +
            '<div style="color:#6B6B6B;font-size:13px;margin-top:6px">This link may be broken or outdated.</div>' +
            '<a href="' + (window.location.origin + (window.location.origin.indexOf('github.io') !== -1 ? '/' + window.location.pathname.split('/').filter(Boolean)[0] : '')) + '/" ' +
            'style="display:inline-block;margin-top:16px;background:#0F766E;color:#fff;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none">Go to Spotly</a>';
        }, 1200);
      }
    })();
  </script>
</body>
</html>
